<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sonni AIoT Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      .recording-pulse {
        animation: pulse-red 1.5s infinite;
      }
      @keyframes pulse-red {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
        }
        70% {
          box-shadow: 0 0 0 20px rgba(239, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }
    </style>
  </head>
  <body
    class="bg-gray-900 text-white h-screen flex items-center justify-center font-sans"
  >
    <div
      class="bg-gray-800 p-10 rounded-2xl shadow-2xl w-full max-w-md text-center border border-gray-700"
    >
      <h1 class="text-3xl font-bold mb-2 tracking-wide text-blue-400">
        <i class="fa-solid fa-car-side mr-2"></i>Sonni AIoT Car
      </h1>
      <p class="text-gray-400 mb-8 text-sm">Giữ để nói, buông để gửi lệnh</p>

      <div class="flex justify-center mb-8">
        <button
          id="record-btn"
          class="w-32 h-32 bg-blue-600 rounded-full flex items-center justify-center text-5xl hover:bg-blue-500 transition-all duration-300 focus:outline-none shadow-lg"
        >
          <i id="mic-icon" class="fa-solid fa-microphone text-white"></i>
        </button>
      </div>
      <p id="record-status" class="text-gray-400 text-sm font-medium mb-4">
        Nhấn và giữ nút để bắt đầu
      </p>

      <div id="loading" class="hidden mb-6">
        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500"></i>
        <p class="text-gray-400 mt-2 text-sm animate-pulse">
          Đang gửi lên xe...
        </p>
      </div>

      <div
        id="result-box"
        class="hidden bg-gray-900 rounded-xl p-6 border border-gray-700"
      >
        <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">
          Bạn đã nói
        </p>
        <p
          id="recognized-text"
          class="text-lg font-medium text-white mb-4 italic"
        >
          "..."
        </p>

        <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">
          Mã lệnh cho xe
        </p>
        <p
          id="vehicle-command"
          class="text-2xl font-bold text-green-400 tracking-widest"
        >
          _
        </p>
      </div>
    </div>

    <script>
      const recordBtn = document.getElementById("record-btn");
      const micIcon = document.getElementById("mic-icon");
      const recordStatus = document.getElementById("record-status");
      const loading = document.getElementById("loading");
      const resultBox = document.getElementById("result-box");
      const recText = document.getElementById("recognized-text");
      const cmdText = document.getElementById("vehicle-command");

      let mediaRecorder;
      let audioChunks = [];

      navigator.mediaDevices
        .getUserMedia({ audio: true })
        .then((stream) => {
          mediaRecorder = new MediaRecorder(stream);

          mediaRecorder.addEventListener("dataavailable", (event) => {
            audioChunks.push(event.data);
          });

          mediaRecorder.addEventListener("stop", async () => {
            const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
            audioChunks = [];
            await sendAudioToServer(audioBlob);
          });
        })
        .catch((err) => {
          recordBtn.classList.add("opacity-50", "cursor-not-allowed");
        });

      const startRecording = () => {
        if (mediaRecorder && mediaRecorder.state === "inactive") {
          mediaRecorder.start();
          recordBtn.classList.remove("bg-blue-600", "hover:bg-blue-500");
          recordBtn.classList.add("bg-red-500", "recording-pulse");
          micIcon.classList.remove("fa-microphone");
          micIcon.classList.add("fa-microphone-lines");
          recordStatus.innerText = "Đang thu âm... (Buông ra để gửi)";
          recordStatus.classList.add("text-red-400");
          resultBox.classList.add("hidden");
        }
      };

      const stopRecording = () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
          recordBtn.classList.remove("bg-red-500", "recording-pulse");
          recordBtn.classList.add("bg-blue-600", "hover:bg-blue-500");
          micIcon.classList.remove("fa-microphone-lines");
          micIcon.classList.add("fa-microphone");
          recordStatus.innerText = "Đang xử lý...";
          recordStatus.classList.remove("text-red-400");
        }
      };

      recordBtn.addEventListener("mousedown", startRecording);
      recordBtn.addEventListener("mouseup", stopRecording);
      recordBtn.addEventListener("mouseleave", stopRecording);

      recordBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        startRecording();
      });
      recordBtn.addEventListener("touchend", (e) => {
        e.preventDefault();
        stopRecording();
      });

      async function sendAudioToServer(audioBlob) {
        const formData = new FormData();
        formData.append("audio_file", audioBlob, "record.webm");

        loading.classList.remove("hidden");
        recordStatus.classList.add("hidden");

        try {
          const response = await fetch("/api/v1/command", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (data.status === "success") {
            recText.innerText = `"${data.recognized_text}"`;
            cmdText.innerText = data.vehicle_command;
            resultBox.classList.remove("hidden");
          } else {
            resultBox.classList.add("hidden");
            console.log(data.message);
          }
        } catch (err) {
          resultBox.classList.add("hidden");
        } finally {
          loading.classList.add("hidden");
          recordStatus.classList.remove("hidden");
          recordStatus.innerText = "Nhấn và giữ nút để bắt đầu";
        }
      }
    </script>
  </body>
</html>
